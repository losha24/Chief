<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChefPro v1.0.7</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header class="main-header">
            <div class="brand-area">
                <img src="logo.png" alt="Logo" class="app-logo">
                <h1 class="app-title">Chef-<span>השף</span></h1>
            </div>
            <div class="header-btns">
                <button id="installBtn" class="btn-install" style="display:none;" onclick="installPWA()">📲 התקנה</button>
                <button onclick="location.reload(true)" class="btn-refresh">🔄 רענון</button>
            </div>
        </header>

        <div class="filter-bar">
            <input type="text" id="searchInput" placeholder="חפש מתכון..." oninput="filterRecipes()">
            <select id="categoryFilter" onchange="filterRecipes()">
                <option value="הכל">הכל 🍽️</option>
                <option value="בשרי">בשרי 🥩</option>
                <option value="חלבי">חלבי 🧀</option>
                <option value="מאפים">מאפים 🥐</option>
                <option value="קינוחים">קינוחים 🍰</option>
                <option value="סלטים">סלטים 🥗</option>
                <option value="פסטות">פסטות 🍝</option>
            </select>
        </div>

        <main id="recipeGrid" class="recipe-grid"></main>

        <nav class="bottom-nav">
            <button onclick="openModal()" class="nav-item main-add">+</button>
            <button onclick="toggleShoppingList()" class="nav-item">🛒</button>
            <button onclick="exportData()" class="nav-item">📥</button>
            <label class="nav-item">📤<input type="file" id="importFile" hidden onchange="importData(event)"></label>
        </nav>

        <div id="editModal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modalTitle">מתכון חדש</h2>
                    <button onclick="closeModal()">✕</button>
                </div>
                <input type="hidden" id="editId">
                <input type="text" id="editTitle" placeholder="שם המתכון">
                <select id="editCat">
                    <option value="בשרי">בשרי 🥩</option>
                    <option value="חלבי">חלבי 🧀</option>
                    <option value="מאפים">מאפים 🥐</option>
                    <option value="קינוחים">קינוחים 🍰</option>
                    <option value="סלטים">סלטים 🥗</option>
                    <option value="פסטות">פסטות 🍝</option>
                </select>
                <textarea id="editIng" placeholder="מצרכים (כל מצרך בשורה חדשה)"></textarea>
                <textarea id="editSteps" placeholder="הוראות הכנה"></textarea>
                <button onclick="saveRecipe()" class="btn-save">שמור מתכון</button>
            </div>
        </div>

        <div id="recipeView" class="modal hidden">
            <div class="modal-content full-view">
                <button onclick="closeModal()" class="back-btn">➜ חזרה</button>
                <div id="viewAreaContent"></div>
            </div>
        </div>

        <div id="shoppingModal" class="modal hidden">
            <div class="modal-content">
                <h3>🛒 רשימת קניות</h3>
                <ul id="shoppingItems"></ul>
                <button onclick="clearShoppingList()" class="btn-save" style="background:#ff4d4d; margin-bottom:10px;">נקה הכל</button>
                <button onclick="closeModal()" class="btn-save">סגור</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
