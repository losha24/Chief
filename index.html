<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chef Manager Pro | אלכסיי זבודיסקר</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#facc15">
</head>
<body>
    <div class="container">
        <header>
            <div class="brand"><img src="logo.png" alt="Logo" class="main-logo"></div>
            <div class="global-actions">
                <button onclick="checkForUpdate()" class="btn-update">🔄 עדכן גרסה</button>
                <button onclick="toggleShoppingList()" class="btn-outline">🛒 קניות</button>
                <button onclick="exportData()" class="btn-outline">📥 גיבוי</button>
            </div>
        </header>

        <div class="toolbar">
            <input type="text" id="searchInput" placeholder="חפש מתכון..." oninput="handleSearch()">
        </div>

        <div id="recipeGrid" class="grid"></div>
        
        <div id="editModal" class="modal hidden">
            <div class="modal-content">
                <input type="hidden" id="editId">
                <h2 id="modalHeaderTitle">פרטי המתכון</h2>
                
                <label>כותרת המתכון:</label>
                <input type="text" id="editTitle" placeholder="למשל: השניצל של אלכסיי">
                
                <div class="form-row">
                    <div>
                        <label>קטגוריה:</label>
                        <input type="text" id="editCat" placeholder="בשרי / חלבי / קינוח">
                    </div>
                    <div>
                        <label>דירוג (1-5):</label>
                        <select id="editRating">
                            <option value="5">⭐⭐⭐⭐⭐</option>
                            <option value="4">⭐⭐⭐⭐</option>
                            <option value="3">⭐⭐⭐</option>
                            <option value="2">⭐⭐</option>
                            <option value="1">⭐</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <input type="text" id="editTime" placeholder="זמן הכנה (למשל: 40 דק')">
                    <input type="number" id="editServings" placeholder="מספר מנות">
                </div>

                <label>קישור לתמונה:</label>
                <input type="text" id="editImg" placeholder="הדבק URL של תמונה כאן">

                <label>מצרכים (כל מצרך בשורה חדשה):</label>
                <textarea id="editIng" rows="4"></textarea>

                <label>הוראות הכנה (כל שלב בשורה חדשה):</label>
                <textarea id="editSteps" rows="4"></textarea>

                <div class="modal-actions">
                    <button onclick="saveRecipe()" class="btn-primary">שמור מתכון</button>
                    <button onclick="closeModal()" class="btn-text">ביטול</button>
                </div>
            </div>
        </div>

        <div id="recipeView" class="modal hidden">
            <div class="modal-content view-area">
                <button onclick="closeModal()" class="close-view">✕</button>
                <div id="viewAreaContent"></div>
            </div>
        </div>

        <footer>
            <p>© 2026 כל הזכויות שמורות - אלכסיי זבודיסקר | גרסה 7.2.3</p>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
