<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChefPro v1.1.0</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header class="main-header">
            <div class="header-top">
                <div class="logo-area">👨‍🍳</div>
                <h1 class="main-title">מתכוני ה-<span>Chef</span></h1>
                <button onclick="location.reload(true)" class="btn-refresh">🔄</button>
            </div>
            
            <div class="action-bar">
                <button id="installBtn" class="action-btn install" onclick="installPWA()">📲 <span>התקנה</span></button>
                <button onclick="toggleShoppingList()" class="action-btn">🛒 <span>קניות</span></button>
                <button onclick="exportData()" class="action-btn">📥 <span>גיבוי</span></button>
                <label class="action-btn">
                    📤 <span>שחזור</span>
                    <input type="file" id="importFile" hidden onchange="importData(event)">
                </label>
            </div>
        </header>

        <div class="filter-area">
            <input type="text" id="searchInput" placeholder="חפש מתכון..." oninput="filterRecipes()">
            <select id="categoryFilter" onchange="filterRecipes()">
                <option value="הכל">הכל 🍽️</option>
                <option value="בשרי">בשרי 🥩</option>
                <option value="חלבי">חלבי 🧀</option>
                <option value="מאפים">מאפים 🥐</option>
                <option value="קינוחים">קינוחים 🍰</option>
                <option value="סלטים">סלטים 🥗</option>
                <option value="פסטות">פסטות 🍝</option>
            </select>
        </div>

        <main id="recipeGrid" class="recipe-grid"></main>

        <button onclick="openModal()" class="floating-add">+</button>

        <div id="editModal" class="modal hidden">
            <div class="modal-content">
                <h3>מתכון חדש</h3>
                <input type="hidden" id="editId">
                <input type="text" id="editTitle" placeholder="שם המתכון">
                <select id="editCat">
                    <option value="בשרי">בשרי</option>
                    <option value="חלבי">חלבי</option>
                    <option value="מאפים">מאפים</option>
                    <option value="קינוחים">קינוחים</option>
                    <option value="סלטים">סלטים</option>
                    <option value="פסטות">פסטות</option>
                </select>
                <textarea id="editIng" placeholder="מצרכים (שורה לכל מצרך)"></textarea>
                <textarea id="editSteps" placeholder="הוראות הכנה"></textarea>
                <div class="modal-btns">
                    <button onclick="saveRecipe()" class="btn-confirm">שמור</button>
                    <button onclick="closeModal()" class="btn-cancel">ביטול</button>
                </div>
            </div>
        </div>

        <div id="recipeView" class="modal hidden">
            <div class="modal-content full-view">
                <button onclick="closeModal()" class="back-btn">➜ חזרה</button>
                <div id="viewAreaContent"></div>
            </div>
        </div>

        <div id="shoppingModal" class="modal hidden">
            <div class="modal-content">
                <h3>🛒 רשימת קניות</h3>
                <ul id="shoppingItems"></ul>
                <button onclick="clearShoppingList()" class="btn-confirm" style="background:#ff6b6b">נקה הכל</button>
                <button onclick="closeModal()" class="btn-cancel">סגור</button>
            </div>
        </div>

        <footer class="version-footer">
            <p>© 2026 אלכסיי זבודיסקר | גרסה 1.1.0</p>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
