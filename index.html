<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chef-השף הצעיר | גרסה 1.0.0</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header class="main-header">
            <div class="brand-area">
                <img src="logo.png" alt="Logo" class="app-logo">
                <h1 class="app-title">Chef-<span>השף הצעיר</span></h1>
            </div>
            <button onclick="silentUpdate()" class="update-btn-top">🔄 עדכון/רענון</button>
        </header>

        <div class="search-section">
            <input type="text" id="searchInput" placeholder="חפש מתכון..." oninput="handleSearch()">
        </div>

        <main id="recipeGrid" class="recipe-grid"></main>

        <nav class="bottom-nav">
            <button onclick="openModal()" class="nav-item main-add">
                <span class="nav-icon">+</span>
                <span class="nav-label">חדש</span>
            </button>
            <button onclick="toggleShoppingList()" class="nav-item">
                <span class="nav-icon">🛒</span>
                <span class="nav-label">קניות</span>
            </button>
            <button onclick="exportData()" class="nav-item">
                <span class="nav-icon">📥</span>
                <span class="nav-label">גיבוי</span>
            </button>
            <label class="nav-item">
                <span class="nav-icon">📤</span>
                <span class="nav-label">שחזור</span>
                <input type="file" id="importFile" style="display:none" onchange="importData(event)">
            </label>
        </nav>

        <div id="editModal" class="modal hidden">
            <div class="modal-content side-drawer">
                <div class="drawer-header">
                    <h2 id="modalHeaderTitle">מתכון חדש</h2>
                    <button onclick="closeModal()" class="close-btn">✕</button>
                </div>
                <div class="form-body">
                    <input type="hidden" id="editId">
                    <input type="text" id="editTitle" placeholder="שם המתכון (חובה)">
                    <div class="input-group">
                        <select id="editCat">
                            <option value="">קטגוריה (חובה)</option>
                            <option value="בשרי">בשרי 🥩</option>
                            <option value="חלבי">חלבי 🧀</option>
                            <option value="מאפים">מאפים 🥐</option>
                            <option value="קינוחים">קינוחים 🍰</option>
                            <option value="סלטים">סלטים 🥗</option>
                            <option value="פסטות">פסטות 🍝</option>
                        </select>
                        <select id="editRating">
                            <option value="5">⭐⭐⭐⭐⭐</option>
                            <option value="4">⭐⭐⭐⭐</option>
                            <option value="3">⭐⭐⭐</option>
                            <option value="2">⭐⭐</option>
                            <option value="1">⭐</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <input type="text" id="editTime" placeholder="זמן">
                        <input type="number" id="editServings" placeholder="מנות">
                    </div>
                    <div class="file-upload-area">
                        <label for="imgUpload" class="file-label">📸 בחר תמונה</label>
                        <input type="file" id="imgUpload" accept="image/*" onchange="handleImageUpload(event)" style="display:none">
                        <div id="imgPreview"></div>
                    </div>
                    <textarea id="editIng" placeholder="מצרכים (חובה - כל מצרך בשורה)"></textarea>
                    <textarea id="editSteps" placeholder="הוראות הכנה"></textarea>
                    <button onclick="saveRecipe()" class="btn-save-full">שמור מתכון</button>
                </div>
            </div>
        </div>

        <div id="shoppingListModal" class="modal hidden">
            <div class="modal-content side-drawer">
                <div class="drawer-header"><h2>🛒 קניות</h2><button onclick="closeModal()" class="close-btn">✕</button></div>
                <ul id="shoppingListItems" class="shop-list"></ul>
                <button onclick="clearShoppingList()" class="btn-clear">נקה הכל</button>
            </div>
        </div>

        <div id="recipeView" class="modal hidden">
            <div class="modal-content full-view">
                <button onclick="closeModal()" class="back-btn">➜ חזרה</button>
                <div id="viewAreaContent"></div>
            </div>
        </div>
        
        <footer class="version-footer">© 2026 אלכסיי זבודיסקר | v1.0.0</footer>
    </div>
    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js'); });
        }
    </script>
</body>
</html>
